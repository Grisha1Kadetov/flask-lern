services:
  postgres:
    image: postgres:16
    container_name: flask_lern_postgres
    environment:
      POSTGRES_DB: flask_lern
      POSTGRES_USER: flask_lern
      POSTGRES_PASSWORD: flask_lern
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
