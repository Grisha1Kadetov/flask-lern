{% extends 'base.html' %}
{% from 'user_form.html' import render_user_form %}

{% block content %}
  <h1 class="my-4">Редактирование пользователя</h1>

  <p class="text-muted">Логин пользователя: {{ user.login }}</p>

  <form method="post" class="border rounded p-3" style="max-width: 720px;" novalidate>
    {{ render_user_form(form_data, errors, roles, include_login_password=False) }}
  </form>
{% endblock %}
